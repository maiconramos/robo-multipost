rules:
  - id: weak-random-secret-generation
    languages: [typescript, javascript]
    severity: ERROR
    message: >
      Segredo/credencial gerado com PRNG não-criptográfico (makeId/Math.random).
      makeId() usa Math.random() (xorshift128+), cujo estado é recuperável a partir de
      poucas saídas. Use crypto.randomBytes para tokens de API, client secrets, authorization
      codes e apiKeys. Ver SECURITY_AUDIT.md achado B2.
    metadata:
      cwe: "CWE-338: Use of Cryptographically Weak PRNG"
      audit-finding: B2
    patterns:
      - pattern-either:
          # token/secret/apiKey/code = makeId(...) ou contém makeId
          - pattern: $X = makeId(...)
          - pattern: $X = '...' + makeId(...)
          - pattern: $X = `...${makeId(...)}...`
          - pattern: $X = Math.random()
      - metavariable-regex:
          metavariable: $X
          regex: (?i).*(token|secret|apikey|api_key|client_?secret|client_?id|password|code|nonce|verifier).*
    paths:
      exclude:
        - "*.spec.ts"
        - "*.test.ts"
        - "**/test/**"
