# Dependabot — version updates + security updates
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Monorepo pnpm: o lockfile fica na raiz, então uma única entrada
# `npm` em `/` cobre todos os workspaces (apps/* e libraries/*).
# Security updates do GitHub abrem PRs imediatamente assim que um
# alerta critical/high aparece — independente do schedule abaixo.

version: 2
updates:
  # JavaScript / TypeScript (pnpm workspace)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    target-branch: "main"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      # Patches e minors de runtime juntos — menos ruído de PR.
      runtime-minor-patch:
        applies-to: version-updates
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      # Dev deps agrupadas (linters, types, jest).
      dev-minor-patch:
        applies-to: version-updates
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      # Security updates agrupados por severidade — PR único por rodada
      # de fixes evita explodir 20 PRs quando o NVD atualiza em massa.
      security-fixes:
        applies-to: security-updates
        patterns:
          - "*"
    # Majors (production) entram em PRs individuais para revisão
    # cuidadosa. Bloqueia upgrades arriscados sem precisar ler o YAML.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions usadas em .github/workflows/*
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"

  # Dockerfile.dev na raiz (devcontainer / dev image)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
