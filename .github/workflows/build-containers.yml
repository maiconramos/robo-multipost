---
name: "Build Containers"

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build-containers-common:
    runs-on: ubuntu-latest
    outputs:
      containerver: ${{ steps.getcontainerver.outputs.containerver }}
      is_prerelease: ${{ steps.getcontainerver.outputs.is_prerelease }}
    steps:
      - name: Get Container Version
        id: getcontainerver
        run: |
          CONTAINERVER="${GITHUB_REF_NAME#v}"
          echo "containerver=$CONTAINERVER" >> "$GITHUB_OUTPUT"
          if [[ "$CONTAINERVER" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build-containers:
    needs: build-containers-common
    strategy:
      matrix:
        include:
          - runnertags: ubuntu-latest
            arch: amd64
          - runnertags: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runnertags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and Push Image
        env:
          CONTAINERVER: ${{ needs.build-containers-common.outputs.containerver }}
          NEXT_PUBLIC_VERSION: ${{ github.ref_name }}
        run: |
          docker buildx build --platform linux/${{ matrix.arch }} \
            -f Dockerfile.dev \
            -t ghcr.io/maiconramos/robo-multipost:${{ env.CONTAINERVER }}-${{ matrix.arch }} \
            --build-arg NEXT_PUBLIC_VERSION=${{ env.NEXT_PUBLIC_VERSION }} \
            --pull \
            --no-cache \
            --provenance=false --sbom=false \
            --output "type=registry,name=ghcr.io/maiconramos/robo-multipost:${{ env.CONTAINERVER }}-${{ matrix.arch }}" .

  build-container-manifest:
    needs: [build-containers, build-containers-common]
    runs-on: ubuntu-latest
    steps:
      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Create Version Manifest
        env:
          CONTAINERVER: ${{ needs.build-containers-common.outputs.containerver }}
        run: |
          # Verify the architecture images
          echo "Verifying AMD64 image:"
          docker buildx imagetools inspect ghcr.io/maiconramos/robo-multipost:${{ env.CONTAINERVER }}-amd64

          echo "Verifying ARM64 image:"
          docker buildx imagetools inspect ghcr.io/maiconramos/robo-multipost:${{ env.CONTAINERVER }}-arm64

          # Try to remove any existing manifest first
          docker manifest rm ghcr.io/maiconramos/robo-multipost:${{ env.CONTAINERVER }} || true

          # Create and push the version-specific manifest
          docker manifest create ghcr.io/maiconramos/robo-multipost:${{ env.CONTAINERVER }} \
            --amend ghcr.io/maiconramos/robo-multipost:${{ env.CONTAINERVER }}-amd64 \
            --amend ghcr.io/maiconramos/robo-multipost:${{ env.CONTAINERVER }}-arm64

          docker manifest push ghcr.io/maiconramos/robo-multipost:${{ env.CONTAINERVER }}

      - name: Create Latest Manifest
        if: needs.build-containers-common.outputs.is_prerelease == 'false'
        env:
          CONTAINERVER: ${{ needs.build-containers-common.outputs.containerver }}
        run: |
          docker manifest rm ghcr.io/maiconramos/robo-multipost:latest || true

          docker manifest create ghcr.io/maiconramos/robo-multipost:latest \
            --amend ghcr.io/maiconramos/robo-multipost:${{ env.CONTAINERVER }}-amd64 \
            --amend ghcr.io/maiconramos/robo-multipost:${{ env.CONTAINERVER }}-arm64

          docker manifest push ghcr.io/maiconramos/robo-multipost:latest

      - name: Create Prerelease Manifest
        if: needs.build-containers-common.outputs.is_prerelease == 'true'
        env:
          CONTAINERVER: ${{ needs.build-containers-common.outputs.containerver }}
        run: |
          docker manifest rm ghcr.io/maiconramos/robo-multipost:prerelease || true

          docker manifest create ghcr.io/maiconramos/robo-multipost:prerelease \
            --amend ghcr.io/maiconramos/robo-multipost:${{ env.CONTAINERVER }}-amd64 \
            --amend ghcr.io/maiconramos/robo-multipost:${{ env.CONTAINERVER }}-arm64

          docker manifest push ghcr.io/maiconramos/robo-multipost:prerelease

      - name: Verify Manifests
        env:
          CONTAINERVER: ${{ needs.build-containers-common.outputs.containerver }}
        run: |
          echo "Version manifest:"
          docker manifest inspect ghcr.io/maiconramos/robo-multipost:${{ env.CONTAINERVER }}

          if [ "${{ needs.build-containers-common.outputs.is_prerelease }}" = "false" ]; then
            echo "Latest manifest:"
            docker manifest inspect ghcr.io/maiconramos/robo-multipost:latest
          else
            echo "Prerelease manifest:"
            docker manifest inspect ghcr.io/maiconramos/robo-multipost:prerelease
          fi
